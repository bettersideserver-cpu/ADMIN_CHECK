<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Interactive SVG Floor Plan</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #f5f5f5
    }

    header {
      padding: 20px;
      background: #222;
      color: #fff
    }

    #floorplan {
      width: 100%;
      max-width: 900px;
      background: #fff;
      border: 1px solid #ddd
    }

    .unit {
      stroke: #333;
      stroke-width: 2;
      cursor: pointer;
      transition: .2s
    }

    .unit:hover {
      filter: brightness(1.15)
    }

    #tooltip {
      position: fixed;
      display: none;
      background: #222;
      color: #fff;
      padding: 8px 12px;
      border-radius: 6px;
      font-size: 14px
    }

    .legend-item {
      display: inline-flex;
      align-items: center;
      margin-right: 15px
    }

    .legend-color {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      margin-right: 6px
    }
  </style>
</head>

<body>
  <header>
    <h1>Interactive Floor Plan</h1>
    <div id="legend"></div>
  </header>

  <main>
    <svg id="floorplan" viewBox="0 0 500 250">
      <rect id="Flat101" class="unit" x="20" y="20" width="120" height="80" />
      <rect id="Flat102" class="unit" x="170" y="20" width="120" height="80" />
      <rect id="Flat103" class="unit" x="320" y="20" width="120" height="80" />
    </svg>
    <div id="tooltip"></div>
  </main>

  <script type="module" src="js/index.js"></script>
</body>

</html>
