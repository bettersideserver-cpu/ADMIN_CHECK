<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Real Estate Admin</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Segoe UI", sans-serif;
        }

        body {
            display: flex;
            background: #f4f6fb;
            color: #333;
        }

        /* Sidebar */

        .sidebar {
            width: 260px;
            height: 100vh;
            background: #1e293b;
            color: #fff;
            position: fixed;
            left: 0;
            top: 0;
            padding: 30px 20px;
        }

        .sidebar h2 {
            text-align: center;
            margin-bottom: 40px;
            font-size: 24px;
        }

        .sidebar ul {
            list-style: none;
        }

        .sidebar li {
            padding: 15px 20px;
            margin-bottom: 10px;
            border-radius: 10px;
            cursor: pointer;
            transition: .3s;
        }

        .sidebar li:hover {
            background: #334155;
        }

        .sidebar li.active {
            background: #2563eb;
        }

        /* Main */

        .main {
            margin-left: 260px;
            width: calc(100% - 260px);
            padding: 30px;
        }

        /* Header */

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 32px;
        }

        .header p {
            color: #777;
            margin-top: 5px;
        }

        .logout {
            background: #ef4444;
            color: #fff;
            border: none;
            padding: 12px 20px;
            border-radius: 8px;
            cursor: pointer;
            transition: .3s;
        }

        .logout:hover {
            background: #dc2626;
        }

        /* Dashboard Cards */

        .cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            margin-bottom: 35px;
        }

        .card {
            background: #fff;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, .08);
        }

        .card h3 {
            color: #777;
            margin-bottom: 10px;
        }

        .card h2 {
            font-size: 34px;
            color: #2563eb;
        }

        /* Section */

        .section {
            background: #fff;
            margin-bottom: 30px;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, .08);
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .section-header h2 {
            font-size: 24px;
        }

        /* Visitor Cards */

        .request-card {
            border: 1px solid #eee;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            transition: .3s;
        }

        .request-card:hover {
            box-shadow: 0 8px 18px rgba(0, 0, 0, .08);
        }

        .request-card h3 {
            margin-bottom: 10px;
        }

        .request-card p {
            margin-bottom: 8px;
            color: #555;
        }

        .status {
            font-weight: bold;
            color: #2563eb;
        }

        .timeSelect {
            width: 180px;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #ccc;
            margin-top: 10px;
            margin-bottom: 15px;
        }

        /* Buttons */

        button {
            cursor: pointer;
        }

        .approve {
            background: #22c55e;
            color: #fff;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            margin-right: 10px;
        }

        .approve:hover {
            background: #16a34a;
        }

        .reject {
            background: #ef4444;
            color: #fff;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
        }

        .reject:hover {
            background: #dc2626;
        }

        /* Tables */

        .propertyTable {
            width: 100%;
            border-collapse: collapse;
        }

        .propertyTable th {
            background: #2563eb;
            color: #fff;
            padding: 15px;
            text-align: left;
        }

        .propertyTable td {
            padding: 15px;
            border-bottom: 1px solid #eee;
        }

        .propertyTable tr:hover {
            background: #f8fbff;
        }

        /* Select */

        select {
            width: 170px;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #ccc;
        }

        /* Color Picker */

        input[type=color] {
            width: 60px;
            height: 40px;
            border: none;
            background: none;
            cursor: pointer;
        }

        /* Save Button */

        .saveProperty {

            background: #2563eb;
            color: #fff;
            border: none;
            padding: 10px 18px;
            border-radius: 8px;

        }

        .saveProperty:hover {

            background: #1d4ed8;

        }

        /* Add Category */

        #addCategory {

            margin-top: 20px;
            background: #16a34a;
            color: #fff;
            border: none;
            padding: 12px 20px;
            border-radius: 8px;

        }

        #addCategory:hover {

            background: #15803d;

        }

        /* Responsive */

        @media(max-width:900px) {

            body {

                flex-direction: column;

            }

            .sidebar {

                position: relative;
                width: 100%;
                height: auto;

            }

            .main {

                margin-left: 0;
                width: 100%;

            }

            .cards {

                grid-template-columns: 1fr;

            }

            .propertyTable {

                display: block;
                overflow: auto;

            }

            /* Delete Button */

            .delete {

                background: #ef4444;

                color: #fff;

                border: none;

                padding: 10px 18px;

                border-radius: 8px;

                cursor: pointer;

                margin-left: 10px;

                font-size: 14px;

                font-weight: 600;

                transition: all .25s ease;

            }

            .delete:hover {

                background: #dc2626;

                transform: translateY(-2px);

                box-shadow: 0 8px 18px rgba(239, 68, 68, .35);

            }

            .delete:active {

                transform: scale(.96);

            }

        }
    </style>

</head>

<body>

    <!-- Sidebar -->

    <aside class="sidebar">

        <h2>🏢 Admin Panel</h2>

        <ul>

            <li class="active">Dashboard</li>

            <li>Visitor Requests</li>

            <li>Properties</li>

            <li>Categories</li>

            <li>Settings</li>

        </ul>

    </aside>

    <!-- Main -->

    <main class="main">

        <!-- Header -->

        <header class="header">

            <div>

                <h1>Dashboard</h1>

                <p>Manage visitors and properties</p>

            </div>

            <button class="logout">

                Logout

            </button>

        </header>

        <!-- Cards -->

        <section class="cards">

            <div class="card">

                <h3>Pending</h3>

                <h2 id="pendingCount">0</h2>

            </div>

            <div class="card">

                <h3>Approved</h3>

                <h2 id="approvedCount">0</h2>

            </div>

            <div class="card">

                <h3>Expired</h3>

                <h2 id="expiredCount">0</h2>

            </div>

            <div class="card">

                <h3>Properties</h3>

                <h2 id="propertyCount">0</h2>

            </div>

        </section>

        <!-- Visitor Requests -->

        <section class="section">

            <div class="section-header">

                <h2>Visitor Requests</h2>

            </div>

            <div id="requestContainer">

                <!-- admin.js loads cards here -->

            </div>

        </section>

        <!-- Property Management -->

        <section class="section">

            <div class="section-header">

                <h2>Property Management</h2>

            </div>

            <table class="propertyTable">

                <thead>

                    <tr>

                        <th>Property</th>

                        <th>Status</th>

                    </tr>

                </thead>

                <tbody id="propertyTable">

                </tbody>

            </table>

        </section>

        <!-- Categories -->

        <section class="section">

            <div class="section-header">

                <h2>Categories</h2>

            </div>

            <table class="propertyTable">

                <thead>

                    <tr>

                        <th>Name</th>

                        <th>Color</th>

                        <th>Action</th>

                    </tr>

                </thead>

                <tbody id="categoryTable">

                    <tr>

                        <td>

                            Available

                        </td>

                        <td>

                            <input type="color" value="#22c55e">

                        </td>

                        <td>

                            <button>

                                Save

                            </button>

                        </td>

                    </tr>

                    <tr>

                        <td>

                            Sold

                        </td>

                        <td>

                            <input type="color" value="#ef4444">

                        </td>

                        <td>

                            <button>

                                Save

                            </button>

                        </td>

                    </tr>

                    <tr>

                        <td>

                            Reserved

                        </td>

                        <td>

                            <input type="color" value="#f59e0b">

                        </td>

                        <td>

                            <button>

                                Save

                            </button>

                        </td>

                    </tr>

                </tbody>

            </table>

            <br>

            <button id="addCategory">

                + Add Category

            </button>

        </section>

    </main>

    <script type="module" src="js/admin.js"></script>

</body>

</html>
